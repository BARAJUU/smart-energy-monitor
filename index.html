<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Energy - Premium Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a12; --card: #151528; --purple: #7b2ff7; --gold: #d4af37; --white: #ffffff; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--gold); margin-bottom: 20px; }
        h1 { color: var(--gold); margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        #status { font-size: 0.9rem; margin-top: 10px; color: #ff4b2b; }
        #status.online { color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.5); }
        
        /* 🕒 Upgrade 0: ป้ายแสดงเวลา */
        .time-badge { text-align: center; color: var(--purple); font-size: 1rem; margin-bottom: 20px; font-weight: 300; }
        .time-badge span { color: var(--gold); font-weight: 600; }

        .tabs { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab { padding: 12px 35px; background: var(--card); border: 2px solid var(--purple); color: var(--white); border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .tab.active { background: var(--purple); border-color: var(--gold); box-shadow: 0 0 20px rgba(123, 47, 247, 0.5); }
        
        /* 🌟 แท็บยอดรวมสีทอง */
        .tab-total { padding: 12px 35px; background: var(--card); border: 2px solid var(--gold); color: var(--white); border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .tab-total.active { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.6); }

        /* 📥 Upgrade 2: ปุ่ม Export */
        .export-btn { padding: 12px 25px; background: transparent; border: 2px solid #00ff88; color: #00ff88; border-radius: 50px; cursor: pointer; font-weight: 600; font-family: 'Kanit'; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .export-btn:hover { background: #00ff88; color: var(--bg); box-shadow: 0 0 15px rgba(0,255,136,0.4); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 25px 15px; border-radius: 20px; border-top: 4px solid var(--gold); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card.cost-card { border-top-color: #00ff88; } /* แยกสีการ์ดค่าไฟให้เด่นขึ้น */
        .card.cost-card .unit { color: #00ff88; }
        .label { color: var(--gold); font-size: 0.9rem; margin-bottom: 10px; }
        .value { font-size: 2.2rem; font-weight: 600; margin-bottom: 5px; }
        .unit { color: var(--purple); font-size: 1rem; }
        .chart-box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.1); height: 300px; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Smart Energy Monitor</h1>
        <div id="status">● MQTT Connecting via GitHub...</div>
    </header>

    <div class="time-badge">🕒 อัปเดตล่าสุด: <span id="time">--:--:--</span></div>

    <div class="tabs">
        <div class="tab active" id="btn1" onclick="setBoard('Board1')">Board 1</div>
        <div class="tab" id="btn2" onclick="setBoard('Board2')">Board 2</div>
        <div class="tab-total" id="btnTotal" onclick="setBoard('Total')">🌟 ยอดรวม (Total)</div>
        <button class="export-btn" onclick="exportCSV()">📥 Export CSV</button>
    </div>

    <div class="grid">
        <div class="card"><div class="label">แรงดัน (Voltage)</div><div class="value" id="v">0.0</div><div class="unit">V</div></div>
        <div class="card"><div class="label">กระแส (Current)</div><div class="value" id="i">0.00</div><div class="unit">A</div></div>
        <div class="card"><div class="label">กำลังไฟ (Power)</div><div class="value" id="p">0.0</div><div class="unit">W</div></div>
        <div class="card"><div class="label">พลังงานสะสม (Energy)</div><div class="value" id="e">0.0000</div><div class="unit">kWh</div></div>
        <div class="card cost-card"><div class="label">ค่าไฟประมาณการ</div><div class="value" id="cost">0.00</div><div class="unit">THB</div></div>
    </div>
    <div class="chart-box"><canvas id="mainChart"></canvas></div>
</div>

<script>
    const config = {
        host: 'd0436a03f0e647899579c81f01d12b76.s1.eu.hivemq.cloud',
        port: 8884,
        topic: 'smart_energy/monitor/data',
        user: 'BRJUU', pass: 'Barajuu0',
        elecRate: 4.7 // 💰 ตั้งค่าเรทค่าไฟ (บาท/หน่วย) ตรงนี้ได้เลย
    };

    let activeBoard = 'Board1';
    
    // 🛠️ เพิ่มพื้นที่เก็บข้อมูลของ ยอดรวม (Total)
    let storage = { 
        'Board1': {t:'--:--:--', v:0, i:0, p:0, e:0, h:Array(20).fill(0), log:[]}, 
        'Board2': {t:'--:--:--', v:0, i:0, p:0, e:0, h:Array(20).fill(0), log:[]},
        'Total':  {t:'--:--:--', v:0, i:0, p:0, e:0, h:Array(20).fill(0), log:[]} 
    };

    const client = mqtt.connect(`wss://${config.host}:${config.port}/mqtt`, {
        username: config.user, password: config.pass,
        clientId: 'gh_dash_' + Math.random().toString(16).slice(2, 10)
    });

    client.on('connect', () => {
        const s = document.getElementById('status');
        s.innerHTML = '● MQTT ONLINE (GitHub Pages)';
        s.className = 'online';
        client.subscribe(config.topic);
    });

    client.on('message', (topic, message) => {
        try {
            const data = JSON.parse(message.toString());
            const id = data.Node;
            
            if (id === 'Board1' || id === 'Board2') {
                const timeStr = data.Time || new Date().toLocaleTimeString('th-TH');
                const boardCost = data.E * config.elecRate;
                
                // อัปเดตข้อมูลรายบอร์ด
                storage[id].t = timeStr;
                storage[id].v = data.V;
                storage[id].i = data.I;
                storage[id].p = data.P;
                storage[id].e = data.E;
                // 🛠️ เปลี่ยนมาเก็บค่า e (Energy) ลงกราฟ
                storage[id].h = [...storage[id].h, data.E].slice(-20);
                
                storage[id].log.push({ t: timeStr, v: data.V, i: data.I, p: data.P, e: data.E, c: boardCost });
                if(storage[id].log.length > 2000) storage[id].log.shift();

                // 🌟 กระบวนการบวกข้อมูล ยอดรวม (Total) อัตโนมัติ
                let b1 = storage['Board1'];
                let b2 = storage['Board2'];
                
                let tV = Math.max(b1.v, b2.v); // โวลต์ใช้ค่าสูงสุดระหว่าง 2 บอร์ด
                let tI = b1.i + b2.i;          // รวมกระแส
                let tP = b1.p + b2.p;          // รวมกำลังไฟ
                let tE = b1.e + b2.e;          // รวมพลังงานสะสม
                let tCost = tE * config.elecRate;
                
                storage['Total'].t = timeStr;
                storage['Total'].v = tV;
                storage['Total'].i = tI;
                storage['Total'].p = tP;
                storage['Total'].e = tE;
                storage['Total'].h = [...storage['Total'].h, tE].slice(-20);
                
                storage['Total'].log.push({ t: timeStr, v: tV, i: tI, p: tP, e: tE, c: tCost });
                if(storage['Total'].log.length > 2000) storage['Total'].log.shift();

                if (id === activeBoard || activeBoard === 'Total') updateDisplay();
            }
        } catch(e) {}
    });

    const ctx = document.getElementById('mainChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { 
            labels: Array(20).fill(''), 
            datasets: [{ 
                label: 'Energy Accumulated (kWh)', // 🛠️ เปลี่ยนชื่อแกนกราฟ
                data: storage[activeBoard].h, 
                borderColor: '#d4af37', 
                backgroundColor: 'rgba(212, 175, 55, 0.1)', 
                fill: true, tension: 0.4 
            }] 
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            scales: { y: { min: 0, ticks: { color: '#fff' } }, x: { display: false } }, 
            plugins: { legend: { labels: { color: '#d4af37' } } } 
        }
    });

    function updateDisplay() {
        const d = storage[activeBoard];
        document.getElementById('time').innerText = d.t; 
        document.getElementById('v').innerText = d.v.toFixed(1);
        document.getElementById('i').innerText = d.i.toFixed(2);
        document.getElementById('p').innerText = d.p.toFixed(1);
        document.getElementById('e').innerText = d.e.toFixed(4); // 🛠️ แสดง 4 ตำแหน่ง
        
        const cost = d.e * config.elecRate;
        document.getElementById('cost').innerText = cost.toFixed(2);

        chart.data.datasets[0].data = d.h;
        chart.update('none');
    }

    function setBoard(id) {
        activeBoard = id;
        document.getElementById('btn1').className = id === 'Board1' ? 'tab active' : 'tab';
        document.getElementById('btn2').className = id === 'Board2' ? 'tab active' : 'tab';
        // 🛠️ สลับคลาสให้ปุ่ม Total
        document.getElementById('btnTotal').className = id === 'Total' ? 'tab-total active' : 'tab-total';
        
        updateDisplay();
    }

    function exportCSV() {
        const logData = storage[activeBoard].log;
        if(logData.length === 0) {
            alert('ยังไม่มีข้อมูลสำหรับโหลด รอกราฟขึ้นสักครู่แล้วกดใหม่');
            return;
        }

        let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
        // 🛠️ เพิ่มคอลัมน์ Cost ลงในไฟล์ Export
        csvContent += "Time,Voltage(V),Current(A),Power(W),Energy(kWh),Cost(THB)\r\n";

        logData.forEach(row => {
            csvContent += `${row.t},${row.v},${row.i},${row.p},${row.e},${row.c.toFixed(2)}\r\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `${activeBoard}_Energy_Data.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
